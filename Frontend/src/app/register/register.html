<div class="auth-wrapper">
  <div class="glass-card">
    <div class="auth-header">
      <h2>Create your <span class="gradient-text">Account</span></h2>
      <p>Join the hub and track your progress.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" placeholder="johndoe" [(ngModel)]="form.username" name="username" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="name@company.com" [(ngModel)]="form.email" name="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" [(ngModel)]="form.password" name="password" required>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!registerForm.valid">
        Create Account
      </button>

      <p class="auth-footer">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </form>
  </div>
</div>
