<div class="auth-wrapper">
  <div class="glass-card">
    <div class="auth-header">
      <div class="logo-mini">Dev<span>Hub</span></div>
      <h2>Welcome <span class="gradient-text">Back</span></h2>
      <p>Enter your credentials to access your roadmaps.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="name@company.com" [(ngModel)]="form.email" name="email" required>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Password</label>
          <a href="#" class="forgot-link">Forgot?</a>
        </div>
        <input type="password" placeholder="••••••••" [(ngModel)]="form.password" name="password" required>
      </div>

      <div class="remember-me">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Stay logged in for 30 days</label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!loginForm.valid">
        Sign In
      </button>

      <p class="auth-footer">
        New to the Hub? <a routerLink="/register">Create an account</a>
      </p>
    </form>
  </div>
</div>
