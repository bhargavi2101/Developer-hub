# Render Deployment Configuration
# This file helps deploy your backend to Render automatically

services:
  # Backend Service
  - type: web
    name: developer-hub-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_SECURE
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SESSION_SECRET
        sync: false

  # Frontend Service (Optional - or use Vercel)
  - type: web
    name: developer-hub-frontend
    env: static
    plan: free
    buildCommand: cd Frontend && npm install && npm run build
    publishDir: Frontend/dist/Frontend/browser
    envVars:
      - key: API_URL
        sync: false